name: Beta Pre-Release

on:
  push:
    branches: [beta]
    paths-ignore:
      - 'README.md'

permissions:
  contents: write

env:
  PRODUCT_NAME: Apps2Samsung
  PROJECT_DIR: Jellyfin2Samsung-CrossOS
  CONFIGURATION: Release

jobs:
# ======================================================
# RELEASE + WINDOWS + LINUX
# ======================================================
  beta-release:
    runs-on: ubuntu-latest

    outputs:
      VERSION: ${{ env.VERSION }}
      VERSION_TAG: ${{ env.VERSION_TAG }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------- VERSION ----------------
      - name: Extract version
        shell: bash
        run: |
          VERSION=$(grep -oE 'v[0-9]+(\.[0-9]+){1,3}' \
            Jellyfin2Samsung-CrossOS/Helpers/AppSettings.cs)

          if [ -z "$VERSION" ]; then
            echo "❌ Version not found"
            exit 1
          fi

          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
          echo "VERSION_TAG=${VERSION}-beta" >> $GITHUB_ENV

      # ---------------- RELEASE NOTES ----------------
      # PR-based notes via GitHub's generate-notes API (categorised by
      # .github/release.yml) instead of a raw `git log` dump.
      - name: Generate changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | grep beta | grep -vx "$VERSION_TAG" | head -n 1)

          ARGS=(-f tag_name="$VERSION_TAG" -f target_commitish="$GITHUB_SHA")
          if [ -n "$LAST_TAG" ]; then
            ARGS+=(-f previous_tag_name="$LAST_TAG")
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" "${ARGS[@]}" --jq .body > CHANGELOG.md; then
            echo "Generated PR-based notes (since ${LAST_TAG:-the beginning})"
          else
            # Fallback: filtered commit log (no [skip ci] noise, no dupes)
            echo "## ✅ What's New & Improved" > CHANGELOG.md
            git log ${LAST_TAG:+$LAST_TAG..HEAD} --pretty=format:"- %s" \
              | grep -iv '\[skip ci\]' | awk '!seen[$0]++' >> CHANGELOG.md
          fi

      - name: Prepare release notes
        run: |
          DATE=$(date +'%Y-%m-%d')
          {
            echo "## 📦 [${VERSION_TAG}] – ${DATE}"
            echo ""
            cat CHANGELOG.md
            echo ""
            echo ""
            echo "| Platform | Status | Notes |"
            echo "|----------|--------|-------|"
            echo "| 🍎 macOS (.app + dmg) | ⚠️ Beta | ARM64 + Intel |"
            echo "| 🍎 macOS (CLI) | ⚠️ Beta | Per-arch tar.gz |"
            echo "| 🐧 Linux | ⚠️ Beta | x64 + ARM64 (tar.gz / .deb) |"
            echo "| 🪟 Windows | ⚠️ Beta | CI-built |"
          } > RELEASE_NOTES.md

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------- WINDOWS ----------------
      - name: Build Windows
        run: |
          dotnet publish Jellyfin2Samsung-CrossOS/Apps2Samsung.csproj \
            -c Release -r win-x64 -p:SelfContained=true \
            -o publish/win-x64

          mkdir -p dist
          (cd publish/win-x64 && zip -r "../../dist/${PRODUCT_NAME}-${VERSION_TAG}-win-x64.zip" .)

      # ---------------- LINUX (x64 + arm64) ----------------
      - name: Build Linux
        run: |
          mkdir -p dist
          for ARCH in x64 arm64; do
            dotnet publish Jellyfin2Samsung-CrossOS/Apps2Samsung.csproj \
              -c Release -r linux-$ARCH -p:SelfContained=true \
              -o publish/linux-$ARCH

            tar -czf "dist/${PRODUCT_NAME}-${VERSION_TAG}-linux-$ARCH.tar.gz" \
              -C publish/linux-$ARCH .
          done

      # ---------------- LINUX ICON ----------------
      - name: Linux icon
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 256 -h 256 \
            jellyfin-tizen-logo.svg -o jellyfin.png

      # ---------------- DEB (x64 + arm64) ----------------
      - name: Build .deb
        run: |
          sudo apt-get install -y dpkg-dev

          for ARCH in x64 arm64; do
            case $ARCH in
              x64)   DEB_ARCH=amd64 ;;
              arm64) DEB_ARCH=arm64 ;;
            esac

            PKG=deb-$ARCH
            mkdir -p $PKG/opt/apps2samsung \
                     $PKG/usr/share/{applications,icons/hicolor/256x256/apps}

            cp -R publish/linux-$ARCH/. $PKG/opt/apps2samsung/
            chmod +x $PKG/opt/apps2samsung/Apps2Samsung

            # 🔥 quick+dirty: allow writes where your app writes
            mkdir -p \
              $PKG/opt/apps2samsung/Logs \
              $PKG/opt/apps2samsung/Downloads \
              $PKG/opt/apps2samsung/Assets/TizenSDB \
              $PKG/opt/apps2samsung/Assets/Certificate
            chmod -R 777 \
              $PKG/opt/apps2samsung/Logs \
              $PKG/opt/apps2samsung/Downloads \
              $PKG/opt/apps2samsung/Assets/TizenSDB \
              $PKG/opt/apps2samsung/Assets/Certificate

            cp jellyfin.png $PKG/usr/share/icons/hicolor/256x256/apps/apps2samsung.png

            cat > $PKG/usr/share/applications/apps2samsung.desktop <<EOF
          [Desktop Entry]
          Name=Apps2Samsung
          Exec=/opt/apps2samsung/Apps2Samsung
          Icon=apps2samsung
          Type=Application
          Categories=Utility;
          EOF

            mkdir -p $PKG/DEBIAN
            cat > $PKG/DEBIAN/control <<EOF
          Package: apps2samsung
          Conflicts: jellyfin2samsung
          Replaces: jellyfin2samsung
          Provides: jellyfin2samsung
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: MadeByPatrick
          Description: Apps2Samsung
          EOF

            dpkg-deb --build $PKG
            mv $PKG.deb dist/${PRODUCT_NAME}-${VERSION_TAG}-linux-$ARCH.deb
          done

      # ---------------- RELEASE (UPDATE SAME TAG EVERY COMMIT) ----------------
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.VERSION_TAG }}
          prerelease: true
          overwrite_files: true
          files: dist/*
          body_path: RELEASE_NOTES.md

# ======================================================
# MACOS (PER-ARCH CLI + APP + DMG)
# ======================================================
  macos-app:
    runs-on: macos-latest
    needs: beta-release

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------- ICON ----------------
      # ---------------- ICON ----------------
      - name: macOS icon (SVG -> ICNS)
        run: |
          # Reliable SVG -> PNG conversion on GitHub macOS runners
          brew install librsvg

          # If the SVG is already in your repo, keep this as-is.
          # If not, uncomment the curl line below and remove the local reference.
          # curl -fsSL \
          #   https://raw.githubusercontent.com/Apps2Samsung/Samsung-Jellyfin-Installer/refs/heads/master/jellyfin-tizen-logo.svg \
          #   -o jellyfin-tizen-logo.svg

          rsvg-convert -w 1024 -h 1024 jellyfin-tizen-logo.svg -o jellyfin.png

          rm -rf icon.iconset
          mkdir icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s jellyfin.png --out icon.iconset/icon_${s}x${s}.png
            sips -z $((s*2)) $((s*2)) jellyfin.png --out icon.iconset/icon_${s}x${s}@2x.png
          done

          iconutil -c icns icon.iconset -o jellyfin.icns

      # ---------------- ARM64 ----------------
      - name: macOS ARM64 publish
        run: |
          dotnet publish Jellyfin2Samsung-CrossOS/Apps2Samsung.csproj \
            -c Release -r osx-arm64 -p:SelfContained=true \
            -o publish/osx-arm64

          mkdir -p dist
          tar -czf \
            dist/${PRODUCT_NAME}-${{ needs.beta-release.outputs.VERSION_TAG }}-macos-arm64.tar.gz \
            -C publish/osx-arm64 .

          APP=Apps2Samsung-arm64.app/Contents
          mkdir -p $APP/MacOS $APP/Resources
          cp -R publish/osx-arm64/* $APP/MacOS/
          chmod +x $APP/MacOS/Apps2Samsung
          cp jellyfin.icns $APP/Resources/

          cat > $APP/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Apps2Samsung</string>
            <key>CFBundleExecutable</key><string>Apps2Samsung</string>
            <key>CFBundleIdentifier</key><string>org.madebypatrick.apps2samsung</string>
            <key>CFBundleVersion</key><string>${{ needs.beta-release.outputs.VERSION }}</string>
            <key>CFBundleShortVersionString</key><string>${{ needs.beta-release.outputs.VERSION }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
          
            <key>CFBundleIconFile</key><string>jellyfin.icns</string>
          </dict>
          </plist>
          EOF

          codesign --deep --force --sign - Apps2Samsung-arm64.app

          rm -rf dmg-arm64
          mkdir -p dmg-arm64
          cp -R Apps2Samsung-arm64.app dmg-arm64/Apps2Samsung.app
          ln -s /Applications dmg-arm64/Applications
          hdiutil create \
            -volname Apps2Samsung \
            -srcfolder dmg-arm64 \
            -format UDZO \
            dist/${PRODUCT_NAME}-${{ needs.beta-release.outputs.VERSION_TAG }}-macos-arm64.dmg

      # ---------------- INTEL ----------------
      - name: macOS Intel publish
        run: |
          dotnet publish Jellyfin2Samsung-CrossOS/Apps2Samsung.csproj \
            -c Release -r osx-x64 -p:SelfContained=true \
            -o publish/osx-x64

          tar -czf \
            dist/${PRODUCT_NAME}-${{ needs.beta-release.outputs.VERSION_TAG }}-macos-x64.tar.gz \
            -C publish/osx-x64 .

          APP=Apps2Samsung-x64.app/Contents
          mkdir -p $APP/MacOS $APP/Resources
          cp -R publish/osx-x64/* $APP/MacOS/
          chmod +x $APP/MacOS/Apps2Samsung
          cp jellyfin.icns $APP/Resources/

          cat > $APP/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Apps2Samsung</string>
            <key>CFBundleExecutable</key><string>Apps2Samsung</string>
            <key>CFBundleIdentifier</key><string>org.madebypatrick.apps2samsung</string>
            <key>CFBundleVersion</key><string>${{ needs.beta-release.outputs.VERSION }}</string>
            <key>CFBundleShortVersionString</key><string>${{ needs.beta-release.outputs.VERSION }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
          
            <key>CFBundleIconFile</key><string>jellyfin.icns</string>
          </dict>
          </plist>
          EOF

          codesign --deep --force --sign - Apps2Samsung-x64.app

          rm -rf dmg-x64
          mkdir -p dmg-x64
          cp -R Apps2Samsung-x64.app dmg-x64/Apps2Samsung.app
          ln -s /Applications dmg-x64/Applications
          hdiutil create \
            -volname Apps2Samsung \
            -srcfolder dmg-x64 \
            -format UDZO \
            dist/${PRODUCT_NAME}-${{ needs.beta-release.outputs.VERSION_TAG }}-macos-x64.dmg

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.beta-release.outputs.VERSION_TAG }}
          name: ${{ needs.beta-release.outputs.VERSION_TAG }}
          prerelease: true
          overwrite_files: true
          files: dist/*
