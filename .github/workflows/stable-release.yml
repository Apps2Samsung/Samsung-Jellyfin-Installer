name: Stable Release

on:
  pull_request:
    branches: [master]
    types: [closed]

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch/tag/SHA). Default: master"
        required: false
        default: "master"
      allow_existing_release:
        description: "If true, update assets even when the stable tag already exists"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  PRODUCT_NAME: Apps2Samsung
  PROJECT_DIR: Jellyfin2Samsung-CrossOS
  CONFIGURATION: Release

jobs:
# ======================================================
# STABLE RELEASE + WINDOWS + LINUX (tar.gz + deb)
# ======================================================
  stable-release:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'master' &&
       github.event.pull_request.head.ref == 'beta') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}
      VERSION_TAG: ${{ steps.version.outputs.VERSION_TAG }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      # ---------------- VERSION (NO -beta allowed) ----------------
      - name: Validate AppVersion (must be stable)
        id: version
        shell: bash
        run: |
          FILE="${PROJECT_DIR}/Helpers/AppSettings.cs"

          VERSION_LINE=$(grep 'AppVersion' "$FILE" || true)

          if echo "$VERSION_LINE" | grep -q '\-beta"'; then
            echo "❌ AppVersion still contains '-beta'"
            echo "   Stable releases must use a clean version like v2.0.0.1"
            exit 1
          fi

          VERSION=$(echo "$VERSION_LINE" | grep -oE 'v[0-9]+(\.[0-9]+){1,3}')

          if [ -z "$VERSION" ]; then
            echo "❌ Failed to extract stable version"
            exit 1
          fi

          echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"
          echo "VERSION_TAG=${VERSION}" >> "$GITHUB_ENV"

          echo "VERSION=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "VERSION_TAG=${VERSION}" >> "$GITHUB_OUTPUT"

      # --------------------------------------------------
      # Guard (log-only): create or update assets
      # --------------------------------------------------
      - name: Stable release exists? (allow updating assets)
        shell: bash
        run: |
          if git tag --list | grep -qx "$VERSION_TAG"; then
            echo "ℹ️ Stable release $VERSION_TAG already exists — will update assets"
          else
            echo "ℹ️ Stable release $VERSION_TAG does not exist — will create it"
          fi

      # --------------------------------------------------
      # Optional: in manual runs, allow user to DISABLE updating an existing release
      # --------------------------------------------------
      - name: Stop if release exists and manual updating is disabled
        if: github.event_name == 'workflow_dispatch' && inputs.allow_existing_release == false
        shell: bash
        run: |
          if git tag --list | grep -qx "$VERSION_TAG"; then
            echo "ℹ️ Release $VERSION_TAG already exists and allow_existing_release=false — exiting"
            exit 0
          fi

      # ---------------- CHANGELOG (from last stable tag) ----------------
      # PR-based notes via GitHub's generate-notes API (categorised by
      # .github/release.yml) instead of a raw `git log` dump.
      - name: Generate changelog
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_STABLE=$(git tag \
            | grep -E '^v[0-9]+(\.[0-9]+){1,3}$' \
            | grep -vx "$VERSION_TAG" \
            | sort -V \
            | tail -n 1)

          ARGS=(-f tag_name="$VERSION_TAG" -f target_commitish="$GITHUB_SHA")
          if [ -n "$LAST_STABLE" ]; then
            ARGS+=(-f previous_tag_name="$LAST_STABLE")
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" "${ARGS[@]}" --jq .body > CHANGELOG.md; then
            echo "Generated PR-based notes (since ${LAST_STABLE:-the beginning})"
          else
            # Fallback: filtered commit log (no [skip ci] noise, no dupes)
            echo "## ✅ What's New & Improved" > CHANGELOG.md
            git log ${LAST_STABLE:+$LAST_STABLE..HEAD} --pretty=format:"- %s" \
              | grep -iv '\[skip ci\]' | awk '!seen[$0]++' >> CHANGELOG.md
          fi

      # ---------------- RELEASE NOTES ----------------
      - name: Prepare release notes
        shell: bash
        run: |
          DATE=$(date +'%Y-%m-%d')

          # Tidy GitHub's generated notes: drop the HTML comment + the redundant
          # "What's Changed" heading, and shorten each
          # "* <title> by @user in <url>/pull/N" line to "- <title> (#N)".
          sed -E \
            -e '/^<!--/d' \
            -e "/^## What's Changed[[:space:]]*$/d" \
            -e 's~^\* (.*) by @[^ ]+ in https?://github.com/[^ ]+/pull/([0-9]+)[[:space:]]*$~- \1 (#\2)~' \
            CHANGELOG.md | cat -s > CHANGELOG.clean.md
          mv CHANGELOG.clean.md CHANGELOG.md

          {
            echo "## 📦 ${VERSION_TAG} — ${DATE}"
            echo ""
            cat CHANGELOG.md
            echo ""
            echo ""
            echo "| Platform | Status | Notes |"
            echo "|----------|--------|-------|"
            echo "| 🍎 macOS (.app + dmg) | ✅ Stable | ARM64 + Intel |"
            echo "| 🍎 macOS (CLI) | ✅ Stable | Per-arch tar.gz |"
            echo "| 🐧 Linux | ✅ Stable | x64 + ARM64 (tar.gz / .deb) |"
            echo "| 🪟 Windows | ✅ Stable | CI-built |"
            echo ""
            echo "---"
            echo ""
            echo "### 🛡️ Security Notice"
            echo "Antivirus warnings may occur and are likely **false positives**."
          } > RELEASE_NOTES.md

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------- WINDOWS ----------------
      - name: Build Windows
        run: |
          dotnet publish ${PROJECT_DIR}/Apps2Samsung.csproj \
            -c $CONFIGURATION -r win-x64 -p:SelfContained=true \
            -o publish/win-x64

          mkdir -p dist
          (cd publish/win-x64 && zip -r "../../dist/${PRODUCT_NAME}-${VERSION_TAG}-win-x64.zip" .)

      # ---------------- LINUX (x64 + arm64) ----------------
      - name: Build Linux
        run: |
          mkdir -p dist
          for ARCH in x64 arm64; do
            dotnet publish ${PROJECT_DIR}/Apps2Samsung.csproj \
              -c $CONFIGURATION -r linux-$ARCH -p:SelfContained=true \
              -o publish/linux-$ARCH

            tar -czf "dist/${PRODUCT_NAME}-${VERSION_TAG}-linux-$ARCH.tar.gz" \
              -C publish/linux-$ARCH .
          done

      # ---------------- LINUX ICON ----------------
      - name: Linux icon
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 256 -h 256 \
            jellyfin-tizen-logo.svg -o jellyfin.png

      # ---------------- DEB (x64 + arm64) ----------------
      - name: Build .deb
        run: |
          sudo apt-get install -y dpkg-dev

          for ARCH in x64 arm64; do
            case $ARCH in
              x64)   DEB_ARCH=amd64 ;;
              arm64) DEB_ARCH=arm64 ;;
            esac

            PKG=deb-$ARCH
            mkdir -p $PKG/opt/apps2samsung \
                     $PKG/usr/share/{applications,icons/hicolor/256x256/apps}

            cp -R publish/linux-$ARCH/. $PKG/opt/apps2samsung/
            chmod +x $PKG/opt/apps2samsung/Apps2Samsung

            # 🔥 quick+dirty: allow writes where your app writes
            mkdir -p \
              $PKG/opt/apps2samsung/Logs \
              $PKG/opt/apps2samsung/Downloads \
              $PKG/opt/apps2samsung/Assets/TizenSDB \
              $PKG/opt/apps2samsung/Assets/Certificate
            chmod -R 777 \
              $PKG/opt/apps2samsung/Logs \
              $PKG/opt/apps2samsung/Downloads \
              $PKG/opt/apps2samsung/Assets/TizenSDB \
              $PKG/opt/apps2samsung/Assets/Certificate

            cp jellyfin.png $PKG/usr/share/icons/hicolor/256x256/apps/apps2samsung.png

            cat > $PKG/usr/share/applications/apps2samsung.desktop <<EOF
          [Desktop Entry]
          Name=Apps2Samsung
          Exec=/opt/apps2samsung/Apps2Samsung
          Icon=apps2samsung
          Type=Application
          Categories=Utility;
          EOF

            mkdir -p $PKG/DEBIAN
            cat > $PKG/DEBIAN/control <<EOF
          Package: apps2samsung
          Conflicts: jellyfin2samsung
          Replaces: jellyfin2samsung
          Provides: jellyfin2samsung
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: MadeByPatrick
          Description: Apps2Samsung
          EOF

            dpkg-deb --build $PKG
            mv $PKG.deb dist/${PRODUCT_NAME}-${VERSION_TAG}-linux-$ARCH.deb
          done

      # ---------------- CREATE/UPDATE STABLE RELEASE ----------------
      - name: Create/Update GitHub Release (stable)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.pull_request.merge_commit_sha }}
          name: ${{ env.VERSION_TAG }}
          prerelease: false
          overwrite_files: true
          files: dist/*
          body_path: RELEASE_NOTES.md

# ======================================================
# MACOS (PER-ARCH CLI + APP + DMG)
# ======================================================
  macos-app:
    runs-on: macos-latest
    needs: stable-release
    if: needs.stable-release.result == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ---------------- ICON ----------------
      - name: macOS icon
        run: |
          sips -s format png jellyfin-tizen-logo.svg --out jellyfin.png
          sips -z 1024 1024 jellyfin.png --out jellyfin.png

          mkdir icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s jellyfin.png --out icon.iconset/icon_${s}x${s}.png
            sips -z $((s*2)) $((s*2)) jellyfin.png --out icon.iconset/icon_${s}x${s}@2x.png
          done
          iconutil -c icns icon.iconset -o jellyfin.icns

      # ---------------- ARM64 ----------------
      - name: macOS ARM64 publish
        run: |
          dotnet publish ${PROJECT_DIR}/Apps2Samsung.csproj \
            -c $CONFIGURATION -r osx-arm64 -p:SelfContained=true \
            -o publish/osx-arm64

          mkdir -p dist
          tar -czf \
            dist/${PRODUCT_NAME}-${{ needs.stable-release.outputs.VERSION_TAG }}-macos-arm64.tar.gz \
            -C publish/osx-arm64 .

          APP=Apps2Samsung-arm64.app/Contents
          mkdir -p $APP/MacOS $APP/Resources
          cp -R publish/osx-arm64/* $APP/MacOS/
          chmod +x $APP/MacOS/Apps2Samsung
          cp jellyfin.icns $APP/Resources/

          cat > $APP/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Apps2Samsung</string>
            <key>CFBundleExecutable</key><string>Apps2Samsung</string>
            <key>CFBundleIdentifier</key><string>org.madebypatrick.apps2samsung</string>
            <key>CFBundleVersion</key><string>${{ needs.stable-release.outputs.VERSION }}</string>
            <key>CFBundleShortVersionString</key><string>${{ needs.stable-release.outputs.VERSION }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>

            <key>CFBundleIconFile</key><string>jellyfin.icns</string>
          </dict>
          </plist>
          EOF

          codesign --deep --force --sign - Apps2Samsung-arm64.app

          rm -rf dmg-arm64
          mkdir -p dmg-arm64
          cp -R Apps2Samsung-arm64.app dmg-arm64/Apps2Samsung.app
          ln -s /Applications dmg-arm64/Applications
          hdiutil create \
            -volname Apps2Samsung \
            -srcfolder dmg-arm64 \
            -format UDZO \
            dist/${PRODUCT_NAME}-${{ needs.stable-release.outputs.VERSION_TAG }}-macos-arm64.dmg

      # ---------------- INTEL ----------------
      - name: macOS Intel publish
        run: |
          dotnet publish ${PROJECT_DIR}/Apps2Samsung.csproj \
            -c $CONFIGURATION -r osx-x64 -p:SelfContained=true \
            -o publish/osx-x64

          tar -czf \
            dist/${PRODUCT_NAME}-${{ needs.stable-release.outputs.VERSION_TAG }}-macos-x64.tar.gz \
            -C publish/osx-x64 .

          APP=Apps2Samsung-x64.app/Contents
          mkdir -p $APP/MacOS $APP/Resources
          cp -R publish/osx-x64/* $APP/MacOS/
          chmod +x $APP/MacOS/Apps2Samsung
          cp jellyfin.icns $APP/Resources/

          cat > $APP/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Apps2Samsung</string>
            <key>CFBundleExecutable</key><string>Apps2Samsung</string>
            <key>CFBundleIdentifier</key><string>org.madebypatrick.apps2samsung</string>
            <key>CFBundleVersion</key><string>${{ needs.stable-release.outputs.VERSION }}</string>
            <key>CFBundleShortVersionString</key><string>${{ needs.stable-release.outputs.VERSION }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>

            <key>CFBundleIconFile</key><string>jellyfin.icns</string>
          </dict>
          </plist>
          EOF

          codesign --deep --force --sign - Apps2Samsung-x64.app

          rm -rf dmg-x64
          mkdir -p dmg-x64
          cp -R Apps2Samsung-x64.app dmg-x64/Apps2Samsung.app
          ln -s /Applications dmg-x64/Applications
          hdiutil create \
            -volname Apps2Samsung \
            -srcfolder dmg-x64 \
            -format UDZO \
            dist/${PRODUCT_NAME}-${{ needs.stable-release.outputs.VERSION_TAG }}-macos-x64.dmg

      # ---------------- UPLOAD MACOS ASSETS TO SAME STABLE RELEASE ----------------
      - name: Upload macOS assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.stable-release.outputs.VERSION_TAG }}
          name: ${{ needs.stable-release.outputs.VERSION_TAG }}
          prerelease: false
          overwrite_files: true
          files: dist/*
